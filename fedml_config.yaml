common_args:
  training_type: "simulation"
  random_seed: 0
  config_version: release

data_args:
  dataset: "pathmnist"
  data_cache_dir: ~/.cache/fedml_data
  partition_method: "hetero"
  partition_alpha: 0.5

model_args:
  model: "lr"

train_args:
  federated_optimizer: "FedAvg"
  client_id_list: "[]"
  client_num_in_total: 5
  client_num_per_round: 5
  comm_round: 20
  epochs: 2
  batch_size: 64
  client_optimizer: sgd
  learning_rate: 0.01
  weight_decay: 0.001

validation_args:
  frequency_of_the_test: 1

device_args:
  using_gpu: false
  gpu_id: 0

comm_args:
  backend: "sp"

tracking_args:
  enable_tracking: false
  enable_wandb: false
  log_file_dir: ./log
  run_name: fedml_torch_fedavg_pathmnist_lr
  mlops_api_key: ""
  mlops_project_name: medmnist-test
  mlops_run_name: fedml_torch_fedavg_pathmnist_lr_5